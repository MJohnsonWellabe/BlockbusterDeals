<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blockbuster Deals: Reinsurance</title>
<style>body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:#0b1f3a;font-family:system-ui,'Segoe UI',Arial,sans-serif}.card{background:#fff;padding:34px 38px;border-radius:10px;box-shadow:0 10px 40px rgba(0,0,0,.4);max-width:360px;width:90%;text-align:center}.t{font-size:1.15rem;font-weight:700;color:#0b1f3a;margin-bottom:4px}.s{font-size:.8rem;color:#666;margin-bottom:18px}input{width:100%;padding:9px 11px;border:1px solid #ccc;border-radius:6px;font-size:.9rem;box-sizing:border-box;margin-bottom:10px}button{width:100%;padding:9px;background:#ffd700;color:#0b1f3a;border:none;border-radius:6px;font-weight:700;font-size:.9rem;cursor:pointer}.e{color:#c0392b;font-size:.72rem;margin-top:8px;height:1em}</style></head>
<body>
<div class="card">
  <div class="t">Blockbuster Deals</div>
  <div class="s">Reinsurance Model &mdash; restricted access</div>
  <input id="pw" type="password" placeholder="Password" autofocus onkeydown="if(event.key==='Enter')chk()">
  <button onclick="chk()">Enter</button>
  <div class="e" id="err"></div>
</div>
<script>
// Client-side obfuscation only (static site). EXPECTED = SHA-256 of the access password.
var EXPECTED="697a6e9f67c021de93a946c75c149c6fc0360a6cee2d334f9c4d154bea7f9cfd";
(function(){try{if(sessionStorage.getItem('bb_auth')===EXPECTED)location.replace('viewer/index.html');}catch(e){}})();
async function chk(){var inp=document.getElementById('pw'),err=document.getElementById('err');
  try{var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(inp.value||''));
    var hex=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
    if(hex===EXPECTED){try{sessionStorage.setItem('bb_auth',hex);}catch(e){}location.replace('viewer/index.html');}
    else{err.textContent='Incorrect password';inp.value='';inp.focus();}
  }catch(e){err.textContent='Crypto unavailable (needs https or localhost)';}}
</script>
</body></html>
